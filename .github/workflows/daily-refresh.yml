name: Daily TNB Refresh

on:
  schedule:
    - cron: "17 7 * * *"
      timezone: "Europe/Berlin"
    - cron: "17 11 * * *"
      timezone: "Europe/Berlin"
    - cron: "17 19 * * *"
      timezone: "Europe/Berlin"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-tnb-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Log scheduled start time
        run: |
          echo "Workflow gestartet"
          echo "UTC Zeit: $(date -u)"
          echo "Deutschland Zeit: $(TZ=Europe/Berlin date)"
          echo "GitHub Event: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh TNB data
        run: |
          echo "Datenabruf gestartet"
          npm run refresh
          echo "Datenabruf beendet"
          echo "Deutschland Zeit nach Abruf: $(TZ=Europe/Berlin date)"

      - name: Check data changes
        run: |
          git status --short
          if git diff --quiet data/tnb-herren.json; then
            echo "Daten geändert: nein"
          else
            echo "Daten geändert: ja"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/tnb-herren.json
          git diff --cached --quiet || git commit -m "Update TNB data"
          git pull --rebase origin main
          git push
          echo "Push Schritt abgeschlossen"
